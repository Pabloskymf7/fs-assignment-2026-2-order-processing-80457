version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  order-api:
    build:
      context: .
      dockerfile: src/OrderManagement.API/Dockerfile
    ports:
      - '5250:8080'
    environment:
      ConnectionStrings__Default: 'Data Source=/app/orders.db'
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  shipping-service:
    build:
      context: .
      dockerfile: src/ShippingService/Dockerfile
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  sportsstore:
    build:
      context: .
      dockerfile: SportsStore/Dockerfile
    ports:
      - '5000:8080'
    environment:
      OrderApiUrl: 'http://order-api:8080/'
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Password: guest
      ConnectionStrings__SportsStoreConnection: 'Server=localhost;Database=SportsStore;Trusted_Connection=true'
      ConnectionStrings__IdentityConnection: 'Server=localhost;Database=SportsStoreIdentity;Trusted_Connection=true'
    depends_on:
      - order-api

  admin-dashboard:
    build:
      context: src/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - order-api
